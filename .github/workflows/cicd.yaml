name: CD with Docker

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "배포할 환경을 선택하세요 ( 현재 의미 없음 )"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
      confirm_deploy:
        description: "배포를 진행하시겠습니까?"
        required: true
        default: false
        type: boolean

permissions:
  contents: read

env:
  SLACK_START_COLOR: "#155dfc"
  SLACK_SUCCESS_COLOR: "#00a63e"
  SLACK_FAILURE_COLOR: "#e7000b"
  SLACK_COMMON_FIELDS: |
    {
      "title": "배포 환경",
      "value": "${{ github.event.inputs.environment }}",
      "short": true
    },
    {
      "title": "워크플로우",
      "value": "<${{ github.server_url }}/${{ github.repository }}/actions/workflows/cicd.yaml|${{ github.workflow }} 워크플로우>",
      "short": true
    },
    {
      "title": "액션작업",
      "value": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }} 작업>",
      "short": true
    },
    {
      "title": "레포지토리",
      "value": "<${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}>",
      "short": true
    },
    {
      "title": "브랜치",
      "value": "${{ github.ref_name }}",
      "short": true
    },
    {
      "title": "실행자",
      "value": "${{ github.actor }}",
      "short": true
    }

jobs:
  Deploy:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.confirm_deploy == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2 # 변경사항 확인을 위해 이전 커밋들 가져옴

      # 시작 시간 설정
      - name: Set start time
        run: |
          echo "TZ='Asia/Seoul'" >> $GITHUB_ENV
          echo "START_TIME=$(TZ='Asia/Seoul' date +%s)" >> $GITHUB_ENV
          echo "START_TIME_FORMATTED=$(TZ='Asia/Seoul' date '+%Y년 %m월 %d일 %H시 %M분 %S초')" >> $GITHUB_ENV

      # 마지막 커밋 메시지(제목) 추출
      - name: Extract last commit message
        id: last-commit
        run: |
          SUBJECT=$(git log -1 --pretty=%s)
          echo "COMMIT_SUBJECT=$SUBJECT" >> $GITHUB_ENV
          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT

      # 변경 파일 감지 (apps/fe, apps/be 하위 변경 여부 확인)
      - name: Check for changes
        id: changes
        run: |
          set -e
          FE_CHANGED=false
          BE_CHANGED=false
          ANY_CHANGED=false

          # 기준 커밋 계산: 이전 커밋이 없으면 빈 문자열
          BASE=$(git rev-parse HEAD~1 2>/dev/null || echo "")

          # 첫 커밋이거나 얕은 히스토리인 경우: 안전하게 둘 다 빌드
          if [ -z "$BASE" ]; then
            # 혹시 깊이가 부족하면 한 번만 더 늘려보기
            git fetch --deepen=1 origin "$GITHUB_REF" || true
            BASE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi

          # 첫 커밋이거나 얕은 히스토리인 경우: 안전하게 둘 다 빌드
          if [ -z "$BASE" ]; then
            FE_CHANGED=true
            BE_CHANGED=true
            ANY_CHANGED=true
          # 이전 커밋이 있는 경우
          else
            CHANGED_FILES=$(git diff --name-only "$BASE"...HEAD || true)
            # apps/fe 하위 변경 시
            echo "$CHANGED_FILES" | grep -E '^apps/fe/' >/dev/null && FE_CHANGED=true || true
            # apps/be 하위 변경 시
            echo "$CHANGED_FILES" | grep -E '^apps/be/' >/dev/null && BE_CHANGED=true || true

            # packages 하위 변경 시 FE/BE 모두 빌드
            if echo "$CHANGED_FILES" | grep -E '^packages/' >/dev/null; then
              FE_CHANGED=true
              BE_CHANGED=true
            fi

            if [ "$FE_CHANGED" = "true" ] || [ "$BE_CHANGED" = "true" ]; then ANY_CHANGED=true; fi
          fi

          echo "fe_changed=$FE_CHANGED" >> $GITHUB_OUTPUT
          echo "be_changed=$BE_CHANGED" >> $GITHUB_OUTPUT
          echo "any_changed=$ANY_CHANGED" >> $GITHUB_OUTPUT

          echo "FE_CHANGED=$FE_CHANGED" >> $GITHUB_ENV
          echo "BE_CHANGED=$BE_CHANGED" >> $GITHUB_ENV
          echo "ANY_CHANGED=$ANY_CHANGED" >> $GITHUB_ENV

      # 배포 시작 알림
      - name: Notify Slack on Start
        id: slack-start
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ env.SLACK_START_COLOR }}",
                  "title": "🚀 수동 배포 시작 🚀",
                  "text": "${{ github.event.inputs.environment }} 환경 | 커밋: ${{ steps.last-commit.outputs.subject }}",
                  "fields": [
                    {
                      "title": "시작시간",
                      "value": "${{ env.START_TIME_FORMATTED }}",
                      "short": true
                    },
                    {
                      "title": "이미지 태그 (SHA)",
                      "value": "${{ github.sha }}",
                      "short": true
                    },
                    ${{ env.SLACK_COMMON_FIELDS }}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Create Frontend env files
        run: |
          mkdir -p ./envs/fe
          mkdir -p ./apps/fe
          echo "${{ secrets.FRENTEND_ENV_FILE }}" > ./envs/fe/.env.production
          echo "${{ secrets.FRENTEND_ENV_FILE }}" > ./apps/fe/.env.production

      - name: Create Backend env files
        run: |
          mkdir -p ./envs/be
          mkdir -p ./apps/be
          echo "${{ secrets.BACKEND_ENV_FILE }}" > ./envs/be/.env.production
          echo "${{ secrets.BACKEND_ENV_FILE }}" > ./apps/be/.env.production

      - name: Install Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/download/v2.24.5/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose

      # AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_ACCESS_SECRET_KEY }}

      # ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Buildx 준비
      - name: Setup buildx
        if: steps.changes.outputs.any_changed == 'true'
        run: |
          docker buildx create --use

      # FE 빌드
      - name: Build FE image
        if: steps.changes.outputs.fe_changed == 'true'
        run: |
          export ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          DOCKER_DEFAULT_PLATFORM=linux/arm64 docker-compose build fe
          docker tag 1-blue/story-dict-fe:latest $ECR_REGISTRY/1-blue/story-dict-fe:latest
          docker tag 1-blue/story-dict-fe:latest $ECR_REGISTRY/1-blue/story-dict-fe:${{ github.sha }}

      # BE 빌드
      - name: Build BE image
        if: steps.changes.outputs.be_changed == 'true'
        run: |
          export ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          DOCKER_DEFAULT_PLATFORM=linux/arm64 docker-compose build be
          docker tag 1-blue/story-dict-be:latest $ECR_REGISTRY/1-blue/story-dict-be:latest
          docker tag 1-blue/story-dict-be:latest $ECR_REGISTRY/1-blue/story-dict-be:${{ github.sha }}

      # FE 푸시
      - name: Push FE image to ECR
        if: steps.changes.outputs.fe_changed == 'true'
        run: |
          export ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker push $ECR_REGISTRY/1-blue/story-dict-fe:latest
          docker push $ECR_REGISTRY/1-blue/story-dict-fe:${{ github.sha }}

      # BE 푸시
      - name: Push BE image to ECR
        if: steps.changes.outputs.be_changed == 'true'
        run: |
          export ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }}
          docker push $ECR_REGISTRY/1-blue/story-dict-be:latest
          docker push $ECR_REGISTRY/1-blue/story-dict-be:${{ github.sha }}

      # 보안 그룹에 인바운드 규칙 추가
      - name: Add GitHub Actions IP to Security Group
        run: |
          # GitHub Actions 러너의 공인 IP 주소 가져오기
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Add GitHub Actions IP to Security Group: $RUNNER_IP"
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr $RUNNER_IP/32

      # EC2 배포
      - name: Deploy Frontend And Backend
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.AWS_EC2_SSH_DNS }} # EC2 IP 주소
          username: ${{ secrets.AWS_EC2_SSH_USER_NAME }} # EC2 사용자 이름
          key: ${{ secrets.AWS_EC2_SSH_PEM_KEY }} # EC2의 .pem 키
          port: ${{ secrets.AWS_EC2_SSH_PORT }} # EC2 포트
          script: |
            cd workspace &&
            # # ECR 레지스트리 URI를 환경변수로 설정
            # export ECR_REGISTRY=${{ steps.login-ecr.outputs.registry }} &&
            # # ECR에 로그인
            # aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | sudo docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }} &&
            # # 기존 컨테이너 정리
            sudo docker stop $(sudo docker ps -aq) || true &&
            sudo docker system prune -a --volumes -f &&
            sudo docker-compose up -d

      # 보안 그룹에서 인바운드 규칙 제거
      - name: Remove GitHub Actions IP from Security Group
        if: always() # 이전 단계가 실패하더라도 항상 실행
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Remove GitHub Actions IP from Security Group: $RUNNER_IP"
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.AWS_SECURITY_GROUP_ID }} \
            --protocol tcp \
            --port 22 \
            --cidr $RUNNER_IP/32

      # 액션 총 소요시간 계산
      - name: Calculate duration
        if: always()
        run: |
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          MINUTES=$((DURATION / 60))
          SECONDS=$((DURATION % 60))
          echo "DURATION=${MINUTES}분 ${SECONDS}초" >> $GITHUB_ENV

      # 배포 성공 알림
      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ env.SLACK_SUCCESS_COLOR }}",
                  "title": "⭕️ 수동 배포 성공 ⭕️",
                  "text": "${{ github.event.inputs.environment }} 환경 | 커밋: ${{ steps.last-commit.outputs.subject }}",
                  "fields": [
                    {
                      "title": "소요시간",
                      "value": "${{ env.DURATION }}",
                      "short": true
                    },
                    {
                      "title": "이미지 태그 (SHA)",
                      "value": "${{ github.sha }}",
                      "short": true
                    },
                    {
                      "title": "FE 빌드",
                      "value": "${{ env.FE_CHANGED == 'true' && '빌드' || '스킵' }}",
                      "short": true
                    },
                    {
                      "title": "BE 빌드",
                      "value": "${{ env.BE_CHANGED == 'true' && '빌드' || '스킵' }}",
                      "short": true
                    }
                    ${{ env.SLACK_COMMON_FIELDS }}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      # 배포 실패 알림
      - name: Notify Slack on Failure
        if: failure()
        id: slack-failure
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ env.SLACK_FAILURE_COLOR }}",
                  "title": "❌ 수동 배포 실패 ❌",
                  "text": "${{ github.event.inputs.environment }} 환경 | 커밋: ${{ steps.last-commit.outputs.subject }}",
                  "fields": [
                    {
                      "title": "소요시간",
                      "value": "${{ env.DURATION }}",
                      "short": true
                    },
                    {
                      "title": "이미지 태그 (SHA)",
                      "value": "${{ github.sha }}",
                      "short": true
                    },
                    {
                      "title": "FE 빌드",
                      "value": "${{ env.FE_CHANGED == 'true' && '빌드' || '스킵' }}",
                      "short": true
                    },
                    {
                      "title": "BE 빌드",
                      "value": "${{ env.BE_CHANGED == 'true' && '빌드' || '스킵' }}",
                      "short": true
                    }
                    ${{ env.SLACK_COMMON_FIELDS }}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
